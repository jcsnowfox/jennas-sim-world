name: Phase 1
on: [pull_request, workflow_dispatch]
jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24.15.0', cache: 'npm' }
      - run: npm ci
      - run: npm run check
      - run: npm run test:phase1
      - run: npm run build
      - run: xvfb-run -a npm run start -- --smoke-test
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: linux-phase1-failure, path: coverage }
  windows-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24.15.0', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npm run package
      - run: npm run package:smoke
      - uses: actions/upload-artifact@v4
        with: { name: windows-phase1-package, path: release/win-unpacked }
